<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Multi Model Project</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false">

    <!-- ================= PLANETS ================= -->

    <!-- MERCURY -->
    <a-marker type="pattern" url="Markers/pattern-mercuryimage.patt">
    <a-gltf-model 
      src="modals/mercury.glb"
      scale="0.2 0.2 0.2"
      rotation="-90 0 0"
      class="clickable"
      click-handler
      data-audio="#mercuryAudio">
    </a-gltf-model>
    <a-sound id="mercuryAudio" src="audio/mercury.mp3" autoplay="false"></a-sound>
  </a-marker>
    <!-- MARS -->
    <a-marker type="pattern" url="Markers/pattern-marsimage.patt" emitevents="true">
        <a-gltf-model 
            src="modals/mars.glb"
            scale="0.2 0.2 0.2"
            rotation="-90 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
        </a-gltf-model>
    </a-marker>

    <!-- JUPITER -->
    <a-marker type="pattern" url="Markers/pattern-jupyterimage.patt" emitevents="true">
        <a-gltf-model 
            src="modals/jupiter.glb"
            scale="1 1 1"
            rotation="-90 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 9000">
        </a-gltf-model>
    </a-marker>

    <!-- SATURN -->
    <a-marker type="pattern" url="Markers/pattern-saturnimage.patt" emitevents="true">
        <a-gltf-model 
            src="modals/saturn.glb"
            scale="0.01 0.01 0.01"
            rotation="-90 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 9000">
        </a-gltf-model>
    </a-marker>

    <!-- URANUS -->
    <a-marker type="pattern" url="Markers/pattern-uranusimage.patt"emitevents="true" emitevents="true">
        <a-gltf-model 
            src="modals/uranus.glb"
            scale="0.15 0.15 0.15"
            rotation="-90 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
        </a-gltf-model>
    </a-marker>

    <!-- NEPTUNE -->
    <a-marker type="pattern" url="Markers/pattern-neptuneimage.patt" emitevents="true">
        <a-gltf-model 
            src="modals/neptune.glb"
            scale="0.001 0.001 0.001"
            rotation="-90 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
        </a-gltf-model>
    </a-marker>

   <!-- SUN / EARTH SYSTEM -->
<a-marker type="pattern" url="Markers/pattern-earthimage.patt" emitevents="true">

    <a-entity
        animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">

        <a-gltf-model 
            src="modals/earth_moon_sun_free_pbr_model.glb"
            scale="2 2 2"
            rotation="-90 0 0">
        </a-gltf-model>

    </a-entity>

</a-marker>

    <a-marker type="pattern" url="Markers/pattern-sunimage.patt" emitevents="true">
        <a-gltf-model 
            src="modals/sun.glb"
            scale="7 7 7"
            rotation="-90 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
        </a-gltf-model>
    </a-marker>

    <!-- ================= HUMAN ORGANS ================= -->

    <!-- HEART -->
    <a-marker type="pattern" url="Markers/pattern-heartimage.patt" emitevents="true">
        <a-gltf-model 
            src="modals/realistic_human_heart.glb"
            scale="1 1 1"
            rotation="-90 0 0">
        </a-gltf-model>
    </a-marker>

    <!-- LUNGS -->
    <a-marker type="pattern" url="Markers/pattern-lungsimage.patt" emitevents="true">
        <a-gltf-model 
            src="modals/realistic_human_lungs.glb"
            scale="5 5 5"
            rotation="-90 0 0">
        </a-gltf-model>
    </a-marker>
<a-marker type="pattern" url="Markers/pattern-atomimage.patt" emitevents="true">
        <a-gltf-model 
            src="modals/atom.glb"
            scale="0.01 0.01 0.01"
            rotation="0 0 0">
        </a-gltf-model>
    </a-marker>
    <a-marker type="pattern" url="Markers/pattern-skeletonimage.patt" emitevents="true">
        <a-gltf-model 
            src="modals/skeleton.glb"
            scale="5 5 5"
            rotation="0 0 0">
        </a-gltf-model>
    </a-marker>
    <!-- CAMERA -->
    <a-entity camera>
        <a-cursor></a-cursor>
    </a-entity>

</a-scene>

</body>
</html>
